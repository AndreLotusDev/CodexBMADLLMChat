schema: 1
story: "2.1"
story_title: "Connection Screen & Credential Input"
gate: CONCERNS
status_reason: "All 5 ACs are fully implemented and tested. One medium security edge case exists: PostgreSQL connection URL is assembled without percent-encoding credentials, which will produce malformed URLs for passwords containing URL-special characters."
reviewer: "Quinn (Test Architect)"
updated: "2026-05-19T00:00:00Z"

waiver: { active: false }

top_issues:
  - id: "SEC-001"
    severity: medium
    finding: "PostgreSQL connection URL built via format!() without percent-encoding. Credentials containing @, %, ?, #, or / corrupt the connection string."
    suggested_action: "Replace format URL with sqlx::postgres::PgConnectOptions builder in connection_manager.rs"
    suggested_owner: dev
  - id: "TEST-001"
    severity: low
    finding: "No test verifies button shows 'Testing...' text while connectionStatus === 'connecting'"
    suggested_action: "Add test for connecting spinner/text state in ConnectionForm.test.tsx"
    suggested_owner: dev
  - id: "TEST-002"
    severity: low
    finding: "Password toggle test only checks one direction (password -> text); reverse not tested"
    suggested_action: "Add second assertion for toggling back to masked state"
    suggested_owner: dev

