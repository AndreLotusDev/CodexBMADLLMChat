schema: 1
story: 'bf.credential-missing-on-saved-profile-connect'
story_title: 'Replace the cryptic "No matching entry found in secure storage" error with an actionable message'
gate: CONCERNS
status_reason: 'Implementation is surgical and correct: AC1-AC6 met, exact-variant `keyring::Error::NoEntry` match (no string inspection), single `MISSING_CREDENTIAL_MESSAGE` const, errors.rs comment mitigating the documented Primary Risk, regression test extended to lock the payload contract, docs row added. The story''s in-scope code change is approval-ready. The CONCERNS gate is driven entirely by the out-of-scope Task 8 fix: discovering that keyring v3 was silently falling back to a process-local mock HashMap (every credential save since project inception was a no-op) is a critical lesson that is **not yet captured in architecture docs** — a future `cargo update` or dependency review could regress it. Also: Task 5 manual smoke test remains deferred to the user, and AC2''s non-NoEntry → CredentialStoreError contract has no automated test (acknowledged in Task 4 as a trait-injection tradeoff).'
reviewer: 'Quinn (Test Architect)'
updated: '2026-05-21T00:00:00Z'

quality_score: 90
expires: '2026-06-04T00:00:00Z'

evidence:
  tests_reviewed: 2
  risks_identified: 5
  trace:
    ac_covered: [1, 2, 3, 4, 5, 6]
    ac_gaps: []
  given_when_then:
    - ac: 1
      gwt: |
        Given a saved profile whose Windows Credential Manager entry has been deleted (or never persisted)
        When `connect_with_saved_profile(profile_id)` is dispatched and `credential_store.retrieve` is reached
        Then the keyring `Err(keyring::Error::NoEntry)` arm fires and the rejection arrives at the frontend as `{ code: 'CredentialNotFound', message: <MISSING_CREDENTIAL_MESSAGE> }` where the message contains both "Re-save" and "Connection screen", names Windows Credential Manager, and DOES NOT contain the substring "No matching entry found in secure storage".
      tests:
        - 'src-tauri/src/credential_store.rs::tests::roundtrip_store_retrieve_delete (#[ignore], extended in Task 4) — asserts payload contains "Re-save" + "Connection" and does NOT contain the raw keyring text'
        - 'Code review of src-tauri/src/credential_store.rs:11-13 (single MISSING_CREDENTIAL_MESSAGE const) and :38-40 (exact NoEntry arm wiring const into AppError::CredentialNotFound)'
    - ac: 2
      gwt: |
        Given a non-`NoEntry` keyring failure (e.g., `PlatformFailure`, `NoStorageAccess`)
        When `entry.get_password()` returns that variant
        Then the catch-all `Err(e)` arm fires and the rejection arrives as `{ code: 'CredentialStoreError', message: "Could not access Windows Credential Manager: <underlying error>" }` — distinguishable from the `CredentialNotFound` actionable path for both the user and any future telemetry.
      tests:
        - 'Code review of src-tauri/src/credential_store.rs:34-46 — exhaustive match: explicit `Err(keyring::Error::NoEntry)` arm followed by catch-all `Err(e)` arm. No string inspection, so AC2 cannot be silently broken by a keyring crate message-text change.'
        - 'No automated test (per Task 4 explicit decision — requires invasive mocking of the keyring crate; see TEST-BF-001).'
    - ac: 3
      gwt: |
        Given the existing `save_profile` compensation rollback path (WinCred-write fails → SQLite row deleted)
        When that path is exercised
        Then the rejection still surfaces as `CredentialStoreError` — no semantic drift on the write path. The `store` method body in credential_store.rs:24-29 is untouched; the `delete` method body in credential_store.rs:49-58 is untouched (including its idempotent `NoEntry` short-circuit).
      tests:
        - 'Code review of src-tauri/src/credential_store.rs — only the `retrieve` method body was modified; diff is +35 lines for retrieve+test, 0 lines in store/delete.'
        - 'src-tauri/src/credential_store.rs::tests::delete_nonexistent_is_idempotent (#[ignore]) — still passes.'
    - ac: 4
      gwt: |
        Given the frontend code path that surfaces the error
        When the rejection arrives in ConnectionForm.tsx:198
        Then `setConnectionStatus("error", (err as TauriCommandError).message ?? "Connection failed")` renders the payload message directly in TestConnectionBanner — no frontend code change needed.
      tests:
        - 'grep `rg "CredentialNotFound" src/` → 0 hits (verified by reviewer) — the frontend treats the code as opaque.'
        - 'Read of src/commands/index.ts and src/components/connection/ConnectionForm.tsx:198-199 — no `CredentialNotFound`-specific branching exists.'
        - 'Test suite: `npm test` → 25 files, 223 tests, all pass (per Dev Agent Record).'
    - ac: 5
      gwt: |
        Given the constraint of no new dependency, no new AppError variant, no IPC schema change
        When the diff is inspected
        Then errors.rs gains only a 3-line comment (verified via `git diff HEAD src-tauri/src/errors.rs`), CredentialNotFound(String) and CredentialStoreError(String) keep their tuple shape, no new variant exists, the `#[serde(tag = "code", content = "message")]` macro is unchanged.
      tests:
        - 'Code review of src-tauri/src/errors.rs — 12 variants, identical to pre-edit set (git diff confirms only the comment was added).'
        - 'NOTE: Cargo.toml DID gain a feature flag (`windows-native`) on the existing keyring dep — this is not a new dependency, but it IS a configuration change that should be considered alongside AC5. See out-of-scope discussion below.'
    - ac: 6
      gwt: |
        Given the extended `roundtrip_store_retrieve_delete` test
        When `cargo test -- --ignored --test-threads=1` runs against a real Windows Credential Manager
        Then after `store.delete(&profile_id)`, calling `store.retrieve(&profile_id)` returns `Err(AppError::CredentialNotFound(msg))` where `msg` contains "Re-save" AND "Connection" AND DOES NOT contain "No matching entry found in secure storage". The test stays `#[ignore]`-gated so CI is unaffected.
      tests:
        - 'src-tauri/src/credential_store.rs:67-89 — extended test asserting both substance and absence of leaked raw text.'
        - 'Dev Agent Record: "Both ignored credential_store tests now pass against real Windows Credential Manager" (post Task 8 fix).'

nfr_validation:
  security:
    status: PASS
    notes: 'The new actionable message contains no sensitive information (profile_id is an internal UUID; no host/database/user data leaked). The exact-variant match arm is more robust than string inspection — it cannot silently misclassify a real `PlatformFailure` as `CredentialNotFound` and mislead a user about remediation. CRUCIALLY, the out-of-scope Task 8 fix (adding `windows-native` to keyring) is itself a **security posture improvement**: pre-fix, every credential save was a silent no-op into a process-local HashMap that vanished at process exit, meaning passwords were neither persisted at rest (architecture §15.2 violation) nor protected by the OS vault. Post-fix, credentials land in Windows Credential Manager as architected. This retroactively closes a major confidentiality + availability gap that has been latent since project inception.'
  performance:
    status: PASS
    notes: 'No performance-relevant changes. The `match` on `entry.get_password()` is the same number of branches as the prior `.map_err`. The `format!` in the catch-all arm only runs on failure (rare path). The `windows-native` feature flag pulls in `windows-sys 0.60.2` as a transitive — adds ~negligible bytes to the final binary on Windows only.'
  reliability:
    status: PASS
    notes: 'Exact-variant matching on `keyring::Error::NoEntry` rather than string inspection means a future keyring crate version that rewords its error messages cannot silently break AC1/AC2 routing — the variant shape is the contract per the crate''s SemVer. The catch-all `Err(e)` arm guarantees no `get_password()` failure can panic. The idempotent `delete` path (NoEntry → Ok) is preserved unchanged, so cleanup logic in profile-deletion stays robust. The Task 8 fix substantially improves runtime reliability: pre-fix, the credential subsystem was a silent no-op; post-fix, both ignored tests pass against real WinCred, confirming the round-trip works end-to-end.'
  maintainability:
    status: CONCERNS
    notes: 'Code-level maintainability is good: single `MISSING_CREDENTIAL_MESSAGE` const, single-file change, clear comments at both edit sites (credential_store.rs:8-10, :36-37, :41-42 and errors.rs:4-6). The actionable string is one-place-to-edit if the Connection screen is ever renamed. The CONCERNS rating is **entirely about the documentation gap around the Task 8 fix**: nowhere in the architecture docs (docs/architecture/15-*.md security, docs/architecture/18-*.md error handling, or any ADR) is the `windows-native` feature flag requirement captured. A future dep audit or `cargo update` to keyring v4 could easily re-introduce the silent-mock-storage regression without any test catching it (CI does not run `--ignored` tests). See DOC-BF-001.'

top_issues:
  - id: 'DOC-BF-001'
    severity: medium
    finding: 'The Task 8 out-of-scope fix (`features = ["windows-native"]` on the keyring v3 dep) addresses a critical regression — every credential save since project inception was a silent no-op into a process-local HashMap. This finding is not captured anywhere in architecture docs. A future maintainer running `cargo update`, switching to keyring v4, or considering swapping the keyring crate has no record of WHY this feature flag is load-bearing. The risk is high-impact (silent credential loss, repeat of the same bug) × medium-probability (typical during routine dep maintenance). Also: the `#[ignore]`-gated round-trip test does NOT run in CI by default, so the same regression would not be caught automatically.'
    suggested_action: 'Two-part fix: (a) add a brief note to docs/architecture/18-error-handling-strategy.md §18.4 (Unrecoverable States) or a new ADR explaining the `windows-native` requirement and the silent-mock-storage failure mode it prevents — include the root-cause sentence "keyring v3+ ships with no default native backend"; (b) consider adding a CI job (Windows-only) that runs `cargo test -- --ignored` against a real WinCred, OR add a non-ignored compile-time assertion that the keyring crate has been built with a native backend (e.g., via a build.rs that fails if no native feature is enabled). Part (a) is essential; part (b) is defense-in-depth.'
    suggested_owner: dev
    refs:
      - 'src-tauri/Cargo.toml:29'
      - 'src-tauri/Cargo.lock:2036-2045'
      - 'docs/architecture/18-error-handling-strategy.md'
      - 'memory/project_keyring_v3_windows_native.md'
  - id: 'SMOKE-BF-001'
    severity: low
    finding: 'Task 5 (manual smoke test in the running Tauri shell) is explicitly deferred to the user but the story has been moved to "Ready for Review". The smoke test is the verification path for Primary Risk in the story''s own Risk Assessment ("Task 5 manual smoke test catches a double-prefix regression visually") and is the only end-to-end check that the new message reaches `TestConnectionBanner` without distortion in a real shell. The Dev Agent Record reports the test was used during development to discover the Task 8 fix — confirming its utility — but the post-fix re-run with the now-correct WinCred persistence has not been documented.'
    suggested_action: 'Before flipping the story to Done: complete the four Task 5 steps end-to-end (save → delete WinCred entry → reconnect to see actionable message → re-save → confirm connect succeeds) and append a one-line confirmation to the Dev Agent Record. This also implicitly verifies DOC-BF-001 part (b) — that the windows-native fix is actually in effect in the dev/Tauri build, not just in the unit test.'
    suggested_owner: dev
    refs:
      - 'docs/stories/brownfield-missing-credential-on-saved-profile-connect.md#tasks-subtasks (Task 5)'
  - id: 'TEST-BF-001'
    severity: low
    finding: 'AC2 ("non-`NoEntry` keyring failures stay distinguishable as CredentialStoreError") has no automated regression test. The Task 4 guidance explicitly accepts this gap because simulating a non-`NoEntry` keyring failure (e.g., `PlatformFailure`) requires invasive mocking of the keyring crate. AC2 is currently enforced only by the structural match-arm shape — which is correct today but could be silently weakened by a refactor that accidentally collapses the `Err(e)` arm back into a single `.map_err` call.'
    suggested_action: 'Optional, lower priority than DOC-BF-001: refactor `CredentialStore` behind a trait `CredentialStoreApi` so `PlatformFailure` can be injected in a unit test. This is the same trait-abstraction noted in the Story 4.1 gate (TEST-4.1-001) for testing the `save_profile` compensation rollback — landing both at once would amortize the refactor cost. If skipped, add a one-line code comment at credential_store.rs:43 explaining that the `Err(e)` arm is load-bearing for AC2 routing.'
    suggested_owner: dev
    refs:
      - 'src-tauri/src/credential_store.rs:38-46'
      - 'docs/qa/gates/4.1-save-load-connection-profiles.yml (TEST-4.1-001)'
  - id: 'MIGR-BF-001'
    severity: low
    finding: 'When this story ships, every existing user with a saved profile (created before the Task 8 keyring fix) will hit the new `CredentialNotFound` actionable message on their next connect attempt — because their credentials never actually landed in WinCred. The story''s actionable message handles this scenario correctly (it tells them to re-save the profile, which is precisely the right remediation), so there is no broken UX. However, there is no release-note / in-app banner / one-time toast acknowledging "this is a regression fix — your saved profile passwords need re-entering". Affected user count is whatever-the-current-user-base is.'
    suggested_action: 'Two options: (a) accept that the actionable message IS the migration UX (zero work, the user is told exactly what to do); (b) add a one-time "What''s New" banner or release note explaining the regression so users understand it is not their fault. Option (a) is defensible for an MVP-stage app; option (b) is a courtesy. Either way, the architecture doc note from DOC-BF-001 should call out the user-facing impact for the changelog author.'
    suggested_owner: po
    refs:
      - 'docs/stories/brownfield-missing-credential-on-saved-profile-connect.md (Dev Agent Record, last bullet of Completion Notes)'
  - id: 'INFO-BF-001'
    severity: low
    finding: 'Two pre-existing test failures in `annotation_repository::upsert_*` (noted in the Dev Agent Record Debug Log References) are present on `main` unrelated to this story. The dev correctly verified they reproduce on unmodified `main` (stashed edits, re-ran suite). Not blocking this story, but they should be tracked.'
    suggested_action: 'File a separate brownfield ticket for `repositories::annotation_repository::tests::upsert_updates_existing_row_on_same_natural_key` and `upsert_handles_null_column_name_for_table_annotations`. Not this gate''s concern, but worth surfacing so it does not stay invisible.'
    suggested_owner: sm
    refs:
      - 'src-tauri/src/repositories/annotation_repository.rs'

