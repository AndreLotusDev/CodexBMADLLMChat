schema: 1
story: '4.2'
story_title: 'Persist Annotations Across Sessions'
gate: CONCERNS
status_reason: >-
  Implementation is complete and well-engineered; frontend gates pass exactly as
  claimed (191/191 tests, lint clean, tsc clean, 245.82 kB / 78.48 kB gz build).
  However, backend `cargo check` / `cargo test` remain unrunnable on this host
  due to the same documented MSVC SDK gap from Story 4.1, so the 10 unit tests
  (including the AC4 FK-cascade test) and the AC5 manual end-to-end flow are
  unverified locally. A small constraint-error routing ambiguity in
  `AnnotationRepository::upsert` is the only code-level concern.
reviewer: 'Quinn (Test Architect)'
updated: '2026-05-20T12:15:00Z'

top_issues:
  - id: 'BE-TESTS-UNVERIFIED'
    severity: medium
    summary: 'Backend `cargo check` / `cargo test` cannot run on this host (MSVC SDK gap inherited from Story 4.1).'
    refs:
      - 'src-tauri/src/repositories/annotation_repository.rs'
    suggested_owner: dev
    suggested_action: >-
      Re-run `cargo check` and `cargo test --lib` in CI or on a properly
      toolchained Windows host before merge. The Rust code is syntactically
      consistent with the Story 4.1 pattern and reviewed clean.

  - id: 'AC5-MANUAL-ONLY'
    severity: low
    summary: >-
      AC5 (annotations survive app restart) has no automated test; Task 20's 12
      manual verification steps remain unchecked.
    refs:
      - 'docs/stories/4.2.story.md#task-20'
    suggested_owner: dev
    suggested_action: >-
      Execute Task 20 manually once the MSVC toolchain is available
      (`npm run tauri dev`). Same MVP gap accepted in Story 4.1.

  - id: 'UPSERT-CONSTRAINT-ROUTING'
    severity: low
    summary: >-
      `AnnotationRepository::upsert` routes every `ConstraintViolation`
      (FK and CHECK) to `AppError::ProfileNotFound`. If the SQL `text_max_length`
      CHECK ever fires (despite the pre-check), the user would see
      "Profile not found" instead of "Annotation too long."
    refs:
      - 'src-tauri/src/repositories/annotation_repository.rs:66-71'
    suggested_owner: dev
    suggested_action: >-
      Discriminate on `sf.extended_code` (`SQLITE_CONSTRAINT_FOREIGNKEY` vs
      `SQLITE_CONSTRAINT_CHECK`) before mapping to `ProfileNotFound`. In practice
      `chars().count()` and SQLite's `length()` agree on Unicode codepoints, so
      this is defense-in-depth rather than a live bug.

