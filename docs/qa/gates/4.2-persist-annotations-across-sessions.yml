        Discriminate `SQLITE_CONSTRAINT_FOREIGNKEY` from
        `SQLITE_CONSTRAINT_CHECK` in `AnnotationRepository::upsert`.
      refs: ['src-tauri/src/repositories/annotation_repository.rs:66-71']
    - action: >-
        Add an `AppError::AnnotationNotFound` variant so
        `AnnotationRepository::delete` does not surface as `Internal("Annotation not found")`.
      refs: ['src-tauri/src/repositories/annotation_repository.rs:99']
    - action: >-
        Add a Vitest case that primes an annotation with a real
        `connectionProfileId`, modifies text, and asserts the upsert path uses
        `existing.id` as the stable id round-trip — covers the
        existing-server-annotation update path that the current 5 IPC tests
        only touch indirectly via the delete-on-empty case.
      refs: ['src/__tests__/AnnotationInput.test.tsx']
    - action: >-
        Once `tracing` lands in a later story, log annotation IPC operations
        (event + id + row count) without raw text content.
      refs: ['src-tauri/src/repositories/annotation_repository.rs']
