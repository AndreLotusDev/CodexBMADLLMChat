    status: PASS
    notes: 'Unchanged. filterSchemaTree wrapped in useMemo keyed on (tree, schemaFilter); empty-query short-circuit returns the same tree reference. Input debounced at 200ms. O(schemas × tables × columns) per filter recomputation — adequate for the ≤200-table MVP budget.'
  reliability:
    status: PASS
    notes: 'CLEAR-RACE fixed. useDebounce now exposes a stable .cancel() method (attached to the returned debounced function via useMemo + useCallback, so the function reference itself stays stable across renders). handleClear cancels the pending timer before resetting input and writing "" to the store. Regression test in SchemaSearchBar.test.tsx clears *before* advancing fake timers and asserts schemaFilter stays "" after 200ms — would have failed against the prior implementation.'
  maintainability:
    status: PASS
    notes: 'Clean fix shape — DebouncedFunction<TArgs> is a small intersection type, useMemo wrapping keeps the returned reference stable, .cancel() is a one-line extension. Backward-compatible — call sites that ignore .cancel() continue to work unchanged. No duplication, no dead code.'

