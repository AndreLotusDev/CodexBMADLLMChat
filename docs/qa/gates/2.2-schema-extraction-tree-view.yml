nfr_validation:
  security:
    status: PASS
    notes: 'Story 2.1 URL-encoding fix correctly applied via PgConnectOptions. Password lifecycle unchanged from Story 2.1. No new ingress vectors.'
  performance:
    status: CONCERNS
    notes: 'AC #7 unvalidated. 5-batch-query design is architecturally correct. Progress event emits twice per table (~401 IPCs for 200 tables) — likely fine but unmeasured.'
  reliability:
