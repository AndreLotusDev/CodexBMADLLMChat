nfr_validation:
  security:
    status: PASS
    notes: 'Password lifecycle (architecture §15.2) fully honored. Verified by code review: (1) password only in React useState in ConnectionForm — never in Zustand store; (2) ConnectionProfile struct (Rust + TS + store) carries no password field; (3) SaveProfileParams.password is consumed in save_profile, written to WinCred, never inserted into connection_profiles SQLite table (which has no password column); (4) explicit drop(params) in save_profile and connect_with_saved_profile; (5) AppError variants never include password content in their format strings (`Internal(String)` is used but the message strings constructed in this story do not interpolate password content); (6) WinCred is the OS-vault-encrypted-at-rest store per NFR3. No new IPC introduces credential leaks; tracing is not yet in Cargo.toml so no log path could leak credentials. One residual concern (TEST-4.1-001) is that the compensation rollback (WinCred-fail → SQLite-delete) is structurally untested, but the static code path is correct.'
  performance:
    status: PASS
    notes: 'Sync std::sync::Mutex<rusqlite::Connection> used directly in async command handlers — sub-ms lock for the single-row operations in this story; not blocking the tokio worker meaningfully for MVP load (<50 profiles, single user). Documented Dev Notes "Sync Mutex Trade-off" with explicit forward-migration path to spawn_blocking when query complexity grows. WAL mode enabled on open (PRAGMA journal_mode = WAL) for read concurrency. list() uses ORDER BY name COLLATE NOCASE — fine for <50 rows without an index. SQLite path resolved via Tauri v2 app.path().app_data_dir() inside .setup() — correct hook for runtime-resolved state. Frontend bundle 244.80 kB / 78.17 kB gzipped (+4.62 kB vs Story 3.3 baseline) for the dropdown + save panel + form integration — proportional to the work added.'
  reliability:
    status: CONCERNS
    notes: 'Excellent: idempotent migrations (CREATE TABLE IF NOT EXISTS + INSERT OR IGNORE); idempotent WinCred delete (swallows NoEntry); FOREIGN KEY constraint with ON DELETE CASCADE ensures annotation rows are removed atomically when a profile is deleted. The save_profile handler implements the architected SQLite-first-then-WinCred ordering with compensation rollback if WinCred fails (avoiding orphan profiles with no credentials). The delete handler implements the inverse ordering (SQLite-first, then idempotent WinCred). Concerns: (1) the compensation rollback IS NOT exercised by any test — to test it we would need to inject a WinCred failure, which is not possible without abstracting CredentialStore behind a trait (TEST-4.1-001); (2) on the rollback path, the SQLite delete is best-effort (`let _ = repo.delete(...)`) — if SQLite mutex is poisoned at the moment, we leak an orphan profile row with no surface error (REL-4.1-001); (3) delete-profile race condition between sessions leaves stale local state on ProfileNotFound (REL-4.1-002). The first concern is the most material — even though the code path is short and clearly correct by inspection, a regression that breaks the compensation could leak orphans without test detection.'
  maintainability:
    status: PASS
    notes: 'Type mirroring (architecture §17.1) respected: ConnectionProfile and SaveProfileParams have matching Rust ⇄ TS shapes with serde rename_all=camelCase. IPC gateway preserved: all invoke() calls funnel through src/commands/index.ts (verified by grep — no direct @tauri-apps/api imports in components). Command handlers stay thin: list_profiles=1 line, save_profile=10 lines, delete_profile=4 lines, connect_with_saved_profile=12 lines — all comfortably ≤15 per architecture §17.1. Field-selector discipline preserved: every new useAppStore(...) call passes a selector. Repository tests use in-memory SQLite — fast, hermetic, no file I/O. Migration is self-contained in 001_initial.sql and includes the annotations table for Story 4.2 (avoids a needless 002 migration). Sibling IPC `connect_with_saved_profile` instead of refactoring `connect_and_extract_schema` — well-justified backward-compatibility decision with explicit forward migration path documented in Dev Notes "Architectural Deviation".'

top_issues:
  - id: 'TEST-4.1-001'
    severity: medium
    finding: 'The save_profile compensation rollback (WinCred-write fails → SQLite row deleted) is structurally untested. The branch in src-tauri/src/commands/profiles.rs:25-29 cannot be unit-tested without introducing a trait abstraction over CredentialStore for failure injection. This is the one place in the new code where the credential trust boundary is crossed and the rollback runs — a silent regression here would either leak credential entries to WinCred without a SQLite row (less likely given the ordering) or, more likely, leak SQLite rows without WinCred entries (orphan profiles whose connect_with_saved_profile call would always fail with CredentialNotFound). The static code path is correct by inspection.'
    suggested_action: 'Option A (recommended): refactor CredentialStore behind a trait `CredentialStoreApi` and inject a mock that returns Err in the compensation test. Adds ~30 lines and one mock impl in tests. Option B (lighter): add an integration-style test that uses a deliberately-conflicting WinCred service_name on the test machine to force a real failure — Windows-only, can be `#[ignore]`d. Option C (minimum): add a code comment with a manual verification recipe (kill WinCred service mid-save, verify SQLite row is rolled back) and accept the test gap as documented MVP scope.'
    suggested_owner: dev
    refs: ['src-tauri/src/commands/profiles.rs:23-32', 'src-tauri/src/credential_store.rs:17-22']
  - id: 'TEST-4.1-002'
    severity: low
    finding: 'connect_with_saved_profile is the new architected sibling IPC for connect-by-profile and is tested only end-to-end via the frontend ConnectionForm test ("Connect button uses connect_with_saved_profile when a saved profile is active"). There is no Rust unit/integration test that exercises the handler directly — the (find profile → retrieve password → build params → drop) sequence is covered by code-review only. The find / retrieve calls each have repository or credential_store tests, but the composition is unverified.'
    suggested_action: 'Optional: add a `#[cfg(test)] mod tests` block to commands/connection.rs that mocks AppState (would require the trait refactor from TEST-4.1-001) and asserts the call sequence. Lower priority than TEST-4.1-001 — the composition is short and each underlying call IS unit-tested.'
    suggested_owner: dev
    refs: ['src-tauri/src/commands/connection.rs:19-37']
  - id: 'TEST-4.1-003'
    severity: low
    finding: 'Backend cargo gates (cargo check, cargo test) could not be executed in the review environment due to the documented pre-existing MSVC SDK toolchain gap (Visual Studio 18 Insiders does not auto-resolve windows.h / msvcrt.lib for cc-rs). The Dev Agent Record acknowledges this for the dev environment as well. The Rust code is reviewed-by-eye only in this session; compile-verification depends on CI or a developer machine with a working MSVC toolchain.'
    suggested_action: 'Before merge, run `cargo check` and `cargo test` on a machine with a working MSVC toolchain (or in CI) to verify (a) the new keyring/rusqlite/uuid/chrono dependencies resolve, (b) the Rust test suite passes, (c) `cargo test -- --ignored` passes the two WinCred roundtrip tests on a Windows host. Document the verification result in the story Dev Agent Record before transitioning the story to Done.'
    suggested_owner: dev
    refs: ['src-tauri/Cargo.toml', 'src-tauri/src/credential_store.rs:47-65', 'docs/stories/4.1.story.md#dev-agent-record-debug-log-references']
  - id: 'SEC-4.1-001'
    severity: low
    finding: 'The repository.insert error mapping collapses ALL ConstraintViolation errors (CHECK name_not_empty, CHECK port_range, and any future UNIQUE) into AppError::DuplicateProfileName. The user-facing message "A profile with this name already exists." is misleading when the actual cause is an empty name or an out-of-range port (1-65535). Risk is low because client-side form validation prevents both cases in normal use, but a bug or future field-addition could surface the wrong message.'
    suggested_action: 'Inspect the SqliteFailure extended code or the constraint name string in the error to differentiate violations. rusqlite returns the constraint name via `extended_code` or the error message — match on that to return ProfileNotFound vs DuplicateProfileName vs a new `InvalidProfile(field)` variant. ~15 lines, additive change.'
    suggested_owner: dev
    refs: ['src-tauri/src/repositories/profile_repository.rs:65-71', 'src-tauri/src/migrations/001_initial.sql:15-16']
  - id: 'REL-4.1-001'
    severity: low
    finding: 'In save_profile, the compensation rollback uses `let _ = state.profile_repo.delete(&profile.id);` — if the SQLite delete fails (e.g., poisoned mutex from a panic in another command), we silently leak an orphan profile row in SQLite while still propagating the original WinCred error. The orphan would then fail every connect_with_saved_profile attempt with CredentialNotFound — visible to the user, but only on next attempt and without explanatory context.'
    suggested_action: 'Either (a) wrap the compensation delete in a tracing::warn! when it fails so the leak is observable in logs (once tracing is added in a later story), or (b) include the rollback failure in the returned error message so the user sees "Failed to save credentials AND failed to clean up — please delete profile manually." For MVP, option (a) is sufficient; option (b) requires the tracing crate.'
    suggested_owner: dev
    refs: ['src-tauri/src/commands/profiles.rs:26-29']
  - id: 'REL-4.1-002'
    severity: low
    finding: 'In ProfileDropdown.handleDelete, when commands.deleteProfile rejects with ProfileNotFound (e.g., the profile was deleted in another session/window since the dropdown was last refreshed), the alert is shown but removeSavedProfile is NOT called — leaving the stale profile entry in the local store. The next refresh (listProfiles on next mount) would correct this, but a user could see a stale entry until they navigate away.'
    suggested_action: 'In the catch block, if the rejected error code is `ProfileNotFound`, also call removeSavedProfile(activeProfile.id) before alerting (or instead of alerting, with a milder "Profile was already removed elsewhere" message). ~3 lines.'
    suggested_owner: dev
    refs: ['src/components/connection/ProfileDropdown.tsx:26-36']
  - id: 'MNT-4.1-001'
    severity: low
    finding: 'In SaveProfileInline.tsx:30-33, the inner empty-name guard `if (name.trim() === '') { setError("Profile name is required"); return }` is effectively dead code in normal user flow because the Save button is `disabled={isSaving || name.trim() === ""}` (line 71). The test at SaveProfileInline.test.tsx:95-104 asserts the disabled state rather than exercising the inner guard. Either the guard is genuine defense-in-depth (in which case the test should bypass the disabled state to exercise it) or it is redundant (remove it). The current state has both belt and suspenders but neither is tested.'
    suggested_action: 'Recommended: remove the inner guard since the disabled-button is the authoritative source of truth. The test stays as-is (asserts the disabled state). Saves 4 lines. Alternative: keep the guard and use `userEvent` or direct call to surface the inner error message — but that adds test surface for behavior that should not be reachable.'
    suggested_owner: dev
    refs: ['src/components/connection/SaveProfileInline.tsx:29-33,71', 'src/__tests__/SaveProfileInline.test.tsx:95-104']

