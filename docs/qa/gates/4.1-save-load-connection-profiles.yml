        - 'src/__tests__/SaveProfileInline.test.tsx — successful save adds the returned profile to the store and sets it active'
        - 'src/__tests__/ConnectionForm.test.tsx — SaveProfileInline appears after test success when no profile is active'
        - 'src/__tests__/ConnectionForm.test.tsx — SaveProfileInline does NOT appear when a saved profile is active even after status=connected'
