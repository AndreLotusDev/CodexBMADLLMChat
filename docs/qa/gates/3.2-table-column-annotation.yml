top_issues:
  - id: 'TEST-3.2-001'
    severity: low
    finding: 'The defense-in-depth `.slice(0, 500)` clamp in `AnnotationInput.tsx:28` has no direct test. The dev notes call out that this exists precisely because Vitest jsdom may not enforce DOM `maxLength` on `fireEvent.change`. A test asserting that a programmatic `value: "x".repeat(501)` produces a stored text of length 500 would lock in the defensive code path.'
    suggested_action: 'Add one test to `AnnotationInput.test.tsx`: fireEvent.change with 501-char value, assert `useAppStore.getState().annotations.get(key)?.text.length === 500`.'
    suggested_owner: dev
    refs: ['src/components/schema/AnnotationInput.tsx:28', 'src/__tests__/AnnotationInput.test.tsx']
  - id: 'TEST-3.2-002'
    severity: low
    finding: 'AC #3 visual-marker tests assert the aria-label change (`Add annotation` → `Edit annotation`) but never assert the className change (`text-muted-foreground/60` → `text-yellow-500`). The actual visual mark is unverified. The story dev notes explicitly chose this trade-off ("avoids brittle Tailwind-class assertions") — acceptable, but worth a single class-presence assertion to guarantee the visual contract.'
    suggested_action: 'Optional polish: add one assertion per node (Table & Column) that the icon button has `text-yellow-500` in its className when annotated. Or capture a visual snapshot when a snapshot tool is added later.'
    suggested_owner: dev
    refs: ['src/components/schema/TableNode.tsx:61', 'src/components/schema/ColumnNode.tsx:57']
  - id: 'MNT-3.2-001'
    severity: low
    finding: '`e.stopPropagation()` on the annotation icon click handlers (`TableNode.tsx:57`, `ColumnNode.tsx:53`) is documented in the story as defensive — the expand button is a sibling, not a parent. The DOM is now in place; the stopPropagation is dead code. Harmless, but the comment-by-implication ("just in case") rots over time.'
    suggested_action: 'Optional cleanup: remove the `e.stopPropagation()` calls and the surrounding handler arrow wrappers can collapse to `onClick={() => setAnnotating(v => !v)}`. Verify with the existing TableNode/ColumnNode tests.'
    suggested_owner: dev
    refs: ['src/components/schema/TableNode.tsx:57', 'src/components/schema/ColumnNode.tsx:53']

